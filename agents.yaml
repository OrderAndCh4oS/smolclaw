agents:
  - name: default
    model: default
    persona: >
      You are SmolClaw. Be direct, be useful, skip the filler.
      Concise when simple, thorough when it matters.
      Search memory before answering. Act rather than narrate.
      When researching with web sources, store useful backing source material with research_source_store.
      Stay within your available read/search tools. Flag uncertainty honestly.
    tools:
      - memory_search
      - memory_graph_query
      - contradiction_review
      - research_source_store
      - memory_recall
      - find_files
      - read_file
      - grep_search
      - git_status
      - git_diff
      - git_branch
      - goal_start
      - goal_status
      - goal_update
      - web_search
      - web_fetch
    capabilities:
      - filesystem
      - command
      - goal
      - web
      - memory
    permission_mode: plan
    bootstrap_path: agents/smolclaw.md
    skills:
      - memory-hygiene.md
    behaviors:
      - reflect
    max_iterations: 15
    memory_window: 20
    context_budget: 8000
    timeout: 600

  - name: researcher
    model: default
    persona: >
      You are a research analyst. Be thorough, cite sources, flag uncertainty.
      Decompose complex questions. Search memory first, then the web.
      Cross-reference findings. Don't present guesses as conclusions.
      Store verified findings that will matter later. For every source that backs a finding,
      save the page summary, URL, and relevant extracted text with research_source_store.
    tools:
      - memory_search
      - memory_graph_query
      - contradiction_review
      - memory_store
      - research_source_store
      - memory_recall
      - web_search
      - web_fetch
      - find_files
      - read_file
      - grep_search
      - git_status
      - git_diff
      - git_branch
      - goal_start
      - goal_status
      - goal_update
    capabilities:
      - filesystem
      - command
      - goal
      - web
      - memory
    permission_mode: research
    bootstrap_path: agents/researcher.md
    behaviors:
      - plan
      - reflect
    max_iterations: 20
    memory_window: 30
    context_budget: 8000
    timeout: 900

  - name: coder
    model: default
    persona: >
      You are a software engineer. Read before modifying. Make minimal changes.
      Test after edits. Don't add comments or refactor unless asked.
      Explain non-obvious decisions. Verify dependencies exist before using them.
    tools:
      - memory_search
      - memory_graph_query
      - contradiction_review
      - memory_recall
      - memory_store
      - find_files
      - read_file
      - grep_search
      - git_status
      - git_diff
      - git_branch
      - git_checkout
      - git_pull
      - git_add
      - git_commit
      - git_push
      - goal_start
      - goal_status
      - goal_update
      - write_file
      - edit_file
      - apply_patch
      - run_command
      - web_search
      - web_fetch
    capabilities:
      - filesystem
      - command
      - goal
      - web
      - memory
    permission_mode: execute
    bootstrap_path: agents/coder.md
    behaviors:
      - plan
      - reflect
    max_iterations: 30
    memory_window: 20
    context_budget: 6000
    timeout: 600

  - name: orchestrator
    model: default
    persona: >
      You are an orchestration coordinator. Delegate work to specialized agents.
      Use sequential_pipeline for multi-step workflows, fanout_pipeline for parallel tasks,
      and route for directing queries to the right specialist.
      Combine results and present a unified response. Use memory only for lookup context.
      Don't do specialist work yourself.
    tools:
      - memory_search
      - memory_recall
      - sequential_pipeline
      - fanout_pipeline
      - route
      - spawn_agent
      - get_result
      - await_result
    capabilities:
      - memory
      - orchestration
      - subagents
    permission_mode: delegate_only
    bootstrap_path: agents/orchestrator.md
    behaviors:
      - plan
    max_iterations: 10
    memory_window: 20
    context_budget: 4000
    timeout: 900
