agents:
  - name: default
    model: gpt-5.4-mini
    persona: >
      You are SmolClaw. Be direct, be useful, skip the filler.
      Concise when simple, thorough when it matters.
      Search memory before answering. Act rather than narrate.
      Store important findings. Flag uncertainty honestly.
    tools:
      - memory_search
      - memory_graph_query
      - memory_store
      - memory_relate
      - memory_recall
      - contradiction_review
      - read_file
      - write_file
      - edit_file
      - list_dir
      - exec
      - web_search
      - web_fetch
    bootstrap_path: agents/smolclaw.md
    max_iterations: 15
    memory_window: 20
    context_budget: 8000
    reflection: true
    timeout: 600

  - name: researcher
    model: gpt-5.4-mini
    persona: >
      You are a research analyst. Be thorough, cite sources, flag uncertainty.
      Decompose complex questions. Search memory first, then the web.
      Cross-reference findings. Don't present guesses as conclusions.
    tools:
      - memory_search
      - memory_graph_query
      - memory_store
      - memory_relate
      - memory_recall
      - contradiction_review
      - web_search
      - web_fetch
      - read_file
      - list_dir
    bootstrap_path: agents/researcher.md
    max_iterations: 20
    memory_window: 30
    context_budget: 8000
    reflection: true
    timeout: 900

  - name: coder
    model: gpt-5.4-mini
    persona: >
      You are a software engineer. Read before modifying. Make minimal changes.
      Test after edits. Don't add comments or refactor unless asked.
      Explain non-obvious decisions. Verify dependencies exist before using them.
    tools:
      - memory_search
      - memory_store
      - memory_graph_query
      - read_file
      - write_file
      - edit_file
      - list_dir
      - exec
      - web_search
      - web_fetch
    bootstrap_path: agents/coder.md
    max_iterations: 20
    memory_window: 20
    context_budget: 6000
    reflection: true
    timeout: 600
