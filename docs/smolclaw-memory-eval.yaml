id: smolclaw_docs_memory
corpus:
  - path: system-design-spec.md
    source_id: system-design-spec
    title: SmolClaw System Design Specification
    kind: produced
    captured_at: "2026-06-26"
    entities:
      - SmolClaw
      - Explicit dependency seams
      - Adapter config
      - RuntimeServices
      - AgentLoop
    relationships:
      - source: SmolClaw
        relation: uses
        target: Explicit dependency seams
      - source: RuntimeServices
        relation: builds
        target: AgentLoop
      - source: Adapter config
        relation: configures
        target: RuntimeServices
    claims:
      - subject: SmolClaw architecture
        predicate: source_of_truth
        object: system-design-spec
  - path: workspaces.md
    source_id: workspaces
    title: SmolClaw Workspaces
    kind: produced
    captured_at: "2026-06-26"
    entities:
      - WorkspaceContext
      - Source root
      - State root
      - Adapter config
      - Reset behavior
    relationships:
      - source: WorkspaceContext
        relation: separates
        target: Source root and state root
      - source: Reset behavior
        relation: preserves
        target: Research sources
      - source: Adapter config
        relation: lives_in
        target: Workspace config
    claims:
      - subject: SmolClaw workspace state
        predicate: location
        object: .smolclaw
  - path: memory-evals.md
    source_id: memory-eval-design
    title: Memory And Knowledge-Graph Evals
    kind: produced
    captured_at: "2026-06-26"
    entities:
      - Memory evals
      - Knowledge graph
      - Source retrieval
      - Citation provenance
      - Staleness checks
    relationships:
      - source: Memory evals
        relation: check
        target: Source retrieval
      - source: Memory evals
        relation: grade
        target: Citation provenance
      - source: Staleness checks
        relation: detect
        target: Stale evidence
    claims:
      - subject: Memory evals
        predicate: purpose
        object: provenance-first answers
  - path: smolclaw-memory-eval.yaml
    source_id: docs-eval-suite
    title: SmolClaw Docs Memory Eval Suite
    kind: produced-config
    captured_at: "2026-06-26"
    entities:
      - Docs eval suite
      - Current docs corpus
      - Deterministic checks
    relationships:
      - source: Docs eval suite
        relation: evaluates
        target: Current docs corpus
      - source: Deterministic checks
        relation: cover
        target: Current docs corpus
    claims:
      - subject: Docs eval suite
        predicate: corpus_scope
        object: current docs
questions:
  - id: explicit_dependency_architecture
    query: How does the SmolClaw system design specification describe explicit dependency seams, adapter-driven runtime behavior, provider factories, command adapters, and RuntimeServices building AgentLoop?
    expected_sources:
      - system-design-spec
    expected_entities:
      - SmolClaw
      - Explicit dependency seams
      - RuntimeServices
      - AgentLoop
    expected_relationships:
      - source: SmolClaw
        relation: uses
        target: Explicit dependency seams
      - source: RuntimeServices
        relation: builds
        target: AgentLoop
    required_terms:
      - explicit constructors
      - adapter-driven
      - command adapter
  - id: workspace_state_boundaries
    query: How do SmolClaw workspaces describe source root, state root, reset behavior, adapter config, and research source preservation?
    expected_sources:
      - workspaces
    expected_entities:
      - WorkspaceContext
      - Source root
      - State root
      - Adapter config
      - Reset behavior
    expected_relationships:
      - source: WorkspaceContext
        relation: separates
        target: Source root and state root
      - source: Reset behavior
        relation: preserves
        target: Research sources
    required_terms:
      - source root
      - state root
      - Adapter Config
  - id: memory_eval_provenance_scope
    query: How do memory evals test deterministic source retrieval, knowledge graph relationships, citation provenance, stale evidence, and contradiction checks?
    expected_sources:
      - memory-eval-design
    expected_entities:
      - Memory evals
      - Knowledge graph
      - Source retrieval
      - Citation provenance
      - Staleness checks
    expected_relationships:
      - source: Memory evals
        relation: check
        target: Source retrieval
      - source: Memory evals
        relation: grade
        target: Citation provenance
    required_terms:
      - citation/provenance
      - stale-source
      - conflicting-claim
  - id: docs_eval_current_corpus
    query: What does the SmolClaw docs memory eval suite say about the current docs corpus and deterministic checks?
    expected_sources:
      - docs-eval-suite
    expected_entities:
      - Docs eval suite
      - Current docs corpus
      - Deterministic checks
    expected_relationships:
      - source: Docs eval suite
        relation: evaluates
        target: Current docs corpus
    required_terms:
      - current docs corpus
      - deterministic checks
staleness:
  - id: system_design_spec_is_current
    source_id: system-design-spec
    expected: fresh
    max_age_days: 45
    as_of: "2026-06-26"
  - id: workspace_docs_are_current
    source_id: workspaces
    expected: fresh
    max_age_days: 45
    as_of: "2026-06-26"
  - id: memory_eval_design_is_current
    source_id: memory-eval-design
    expected: fresh
    max_age_days: 45
    as_of: "2026-06-26"
